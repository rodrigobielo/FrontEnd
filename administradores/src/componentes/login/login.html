<div class="login-container min-vh-100 d-flex justify-content-center align-items-center p-3"
     style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
  <div class="card shadow-2xl border-0 rounded-4 login-card"
       style="max-width: 480px; width: 100%; backdrop-filter: blur(10px); background: rgba(255,255,255,0.98);">
    
    <!-- Header con logo -->
    <div class="card-body p-0">
      <div class="text-center pt-5 pb-3">
        <!-- Logo -->
        <div class="mb-4">
          <img src="logo.jpeg" alt="Logo" 
               style="width: 80px; height: 80px; object-fit: contain;"
               class="rounded-circle shadow-sm">
        </div>
        
        <!-- Título -->
        <h2 class="h3 mb-2 fw-bold"
            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                   -webkit-background-clip: text;
                   -webkit-text-fill-color: transparent;
                   background-clip: text;">
          Bienvenido
        </h2>
        <p class="text-muted mb-0 small">Ingrese sus credenciales para continuar</p>
      </div>
      
      <!-- Formulario de login -->
      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate class="p-4 pt-0">
        
        <!-- Campo de email -->
        <div class="mb-4">
          <label for="email" class="form-label fw-semibold small text-secondary mb-2">
            <i class="bi bi-envelope-fill me-1"></i> Correo Electrónico
          </label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0 ps-3 pe-2">
              <i class="bi bi-envelope-fill text-muted" style="font-size: 1.1rem;"></i>
            </span>
            <input 
              type="email" 
              class="form-control border-start-0 py-2" 
              id="email" 
              name="email"
              placeholder="usuario@ejemplo.com"
              [(ngModel)]="credentials.email"
              #email="ngModel"
              required
              email
              [class.is-invalid]="email.invalid && (email.dirty || email.touched || loginForm.submitted)"
              style="background-color: #f8f9fa;"
            >
          </div>
          <!-- Mensajes de error para email -->
          <div class="invalid-feedback d-block small mt-1" *ngIf="email.invalid && (email.dirty || email.touched || loginForm.submitted)">
            <span *ngIf="email.errors?.['required']">
              <i class="bi bi-exclamation-circle me-1"></i>El email es requerido
            </span>
            <span *ngIf="email.errors?.['email']">
              <i class="bi bi-exclamation-circle me-1"></i>Formato de email inválido
            </span>
          </div>
        </div>
        
        <!-- Campo de contraseña -->
        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <label for="contrasena" class="form-label fw-semibold small text-secondary mb-0">
              <i class="bi bi-lock-fill me-1"></i> Contraseña
            </label>
            <button type="button" class="btn btn-link p-0 small text-decoration-none" 
                    style="color: #667eea;" (click)="onForgotPassword()">
              ¿Olvidó su contraseña?
            </button>
          </div>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0 ps-3 pe-2">
              <i class="bi bi-lock-fill text-muted" style="font-size: 1.1rem;"></i>
            </span>
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              class="form-control border-start-0 py-2" 
              id="contrasena" 
              name="contrasena"
              placeholder="••••••••"
              [(ngModel)]="credentials.contrasena"
              #contrasena="ngModel"
              required
              minlength="6"
              [class.is-invalid]="contrasena.invalid && (contrasena.dirty || contrasena.touched || loginForm.submitted)"
              style="background-color: #f8f9fa;"
            >
            <button class="btn btn-outline-secondary border-start-0 bg-white" 
                    type="button" 
                    (click)="togglePasswordVisibility()"
                    style="border-left: none;">
              <i class="bi text-muted" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
            </button>
          </div>
          <!-- Mensajes de error para contraseña -->
          <div class="invalid-feedback d-block small mt-1" *ngIf="contrasena.invalid && (contrasena.dirty || contrasena.touched || loginForm.submitted)">
            <div *ngIf="contrasena.errors?.['required']">
              <i class="bi bi-exclamation-circle me-1"></i>La contraseña es requerida
            </div>
            <div *ngIf="contrasena.errors?.['minlength']">
              <i class="bi bi-exclamation-circle me-1"></i>La contraseña debe tener al menos 6 caracteres
            </div>
          </div>
        </div>
        
        <!-- Checkbox recordar sesión -->
        <div class="form-check mb-4">
          <input class="form-check-input" 
                 type="checkbox" 
                 id="rememberMe" 
                 name="rememberMe" 
                 [(ngModel)]="credentials.rememberMe"
                 style="cursor: pointer;">
          <label class="form-check-label small" for="rememberMe" style="cursor: pointer;">
            Recordar mis datos
          </label>
        </div>
        
        <!-- Mensaje de error general -->
        <div *ngIf="loginError" class="alert alert-danger alert-dismissible fade show mb-4" 
             role="alert" style="border-radius: 12px;">
          <div class="d-flex align-items-center">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span class="small">{{loginError}}</span>
            <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" 
                    aria-label="Close" (click)="clearError()"></button>
          </div>
        </div>
        
        <!-- BOTÓN DE INICIAR SESIÓN -->
        <div class="d-grid mb-4">
          <button 
            type="submit" 
            class="btn btn-primary fw-semibold py-3 border-0"
            [disabled]="isLoading || loginForm.invalid"
            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                   border-radius: 12px;
                   transition: transform 0.2s, box-shadow 0.2s;">
            <span *ngIf="!isLoading">
              <i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
            </span>
            <span *ngIf="isLoading">
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Iniciando Sesión...
            </span>
          </button>
        </div>
        
        <!-- Información del sistema -->
        <div class="text-center pt-3 border-top">
          <p class="small text-muted mb-2">
            <i class="bi bi-shield-check me-1"></i>
            Acceso restringido a usuarios autorizados
          </p>
          <p class="small text-muted mb-0">
            <i class="bi bi-building me-1"></i>
            Sistema Hotelero v2.1.0
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
